<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="imglogo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6L1x2RgW2chYcgGnZFgiPOxsT7yDWJd23EZaJkIvMvxrIhFh5VWssdsA&s=10"
                alt="">
        </div>
        <div class="headerText">
            <h2>THE MUSIC PALYER</h2>
        </div>
        <div class="playlist">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3L20 3"></path>
                <path d="M2 10L15 10"></path>
                <path d="M2 17L9 17"></path>
                <path
                    d="M18.25 19C18.25 20.6569 16.8509 22 15.125 22C13.3991 22 12 20.6569 12 19C12 17.3431 13.3991 16 15.125 16C16.8509 16 18.25 17.3431 18.25 19ZM18.25 19V10C18.6667 10.6 19 13.12 22 13.6">
                </path>
            </svg>
        </div>
    </header>

    <main>
        <div class="center">

            <div class="vol-img-div">

                <div class="volume1">

                    <div class="volume-icons-div">
                        <img src="volume.svg" class="volume-icons" id="vol-svg" alt="">
                    </div>

                    <div class="volume">
                        <input type="range" min="" max="" value="" onchange="volume()" id="volume-range">
                    </div>

                </div>



                <div class="song-img">

                </div>

            </div>

            <div class="main-deatail">

                <div class="deatails">
                    <h3 id="song-name">Simple Rock</h3>
                </div>
                <input type="range" id="song-duration" onchange="duration()">

            </div>

            <div class="mainControls">
                <div class="controls">

                    <div class="prev-icons">
                        <img src="prev.svg" id="prev-icons" onclick="previousSong()" alt="">
                    </div>

                    <div class="play-pause">
                        <img src="play.svg" id="play-pause" onclick="playPauseFn()" alt="">
                        
                    </div>

                    <div class="next-icons">
                        <img src="next.svg" id="next-icons" onclick="nextSong()" alt="">
                    </div>

                </div>
            </div>

        </div>


    </main>

    <script src="app.js"></script>
</body>

</html>
